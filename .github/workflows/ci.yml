name: KURGIN Streamlit CI

on:
  workflow_dispatch:

jobs:
  checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Compile Python files
        run: |
          python -m py_compile app.py
          python -m py_compile catalog/catalog_core.py
          python -m py_compile catalog/data_loader.py
          python -m py_compile ui/mobile_shell.py

      - name: Run public price state smoke checks
        run: |
          python scripts/smoke_public_price_states.py
