name: KURGIN Streamlit CI

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Compile Python files
        run: |
          python -m py_compile app.py
          python -m py_compile catalog/catalog_core.py
          python -m py_compile catalog/data_loader.py
          python -m py_compile services/__init__.py
          python -m py_compile services/analyzer_adapter.py
          python -m py_compile scripts/smoke_analyzer_adapter_contract.py
          python -m py_compile scripts/smoke_analyzer_preview_ui.py
          python -m py_compile ui/mobile_shell.py
          python -m py_compile ui/scripts.py
          python -m py_compile ui/extra_styles.py
          python -m py_compile ui/styles.py
          python -m py_compile ui/index_components.py
          python -m py_compile ui/index_data.py
          python -m py_compile ui/index_scripts.py
          python -m py_compile ui/index_styles.py
          python -m py_compile ui/pages/kurgin_page.py
          python -m py_compile ui/pages/tools_page.py
          python -m py_compile ui/pages/tools/__init__.py
          python -m py_compile ui/pages/tools/analyzer_preview.py
          python -m py_compile ui/pages/tools/index_panel.py
          python -m py_compile ui/pages/favorites_page.py
          python -m py_compile ui/pages/cart_page.py
          python -m py_compile ui/pages/profile_page.py
          python -m py_compile config/request_contacts.py

      - name: Check forbidden production patterns
        shell: bash
        run: |
          set -euo pipefail
          pattern='onerror|textarea|new[[:space:]]+Function|eval[[:space:]]*\(|createOrder'
          targets=(app.py catalog config ui services)
          if grep -RInE "$pattern" -- "${targets[@]}"; then
            echo "Forbidden production pattern found. Remove it or move it out of production code."
            exit 1
          fi

      - name: Run public price state smoke checks
        run: |
          python scripts/smoke_public_price_states.py

      - name: Run Analyzer adapter contract smoke checks
        run: |
          python scripts/smoke_analyzer_adapter_contract.py

      - name: Run Analyzer preview UI smoke checks
        run: |
          python scripts/smoke_analyzer_preview_ui.py
